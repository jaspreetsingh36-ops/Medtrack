{% extends "base.html" %}

{% block title %}Add Prescription - MedTrack{% endblock %}

{% block page_title %}Add Prescription{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <h2><i class="bi bi-capsule"></i> Add Prescription</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="medicine_name" class="form-label">Medicine Name *</label>
            <input type="text" class="form-control" id="medicine_name" name="medicine_name" required>
        </div>
        
        <div class="mb-3">
            <label for="dosage" class="form-label">Dosage</label>
            <input type="text" class="form-control" id="dosage" name="dosage" placeholder="e.g., 500mg, 1 tablet">
        </div>
        
        <div class="mb-3">
            <label for="duration" class="form-label">Duration</label>
            <input type="text" class="form-control" id="duration" name="duration" placeholder="e.g., 7 days, 2 weeks">
        </div>
        
        <div class="mb-3">
            <label for="instructions" class="form-label">Instructions</label>
            <textarea class="form-control" id="instructions" name="instructions" rows="3" 
                      placeholder="e.g., Take after meals, avoid alcohol"></textarea>
        </div>
        
        <div class="alert alert-warning">
            <i class="bi bi-exclamation-triangle"></i>
            <small>Please ensure all medication details are accurate before saving.</small>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Add Prescription
            </button>
            <a href="{{ url_for('view_visit', visit_id=visit_id) }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
