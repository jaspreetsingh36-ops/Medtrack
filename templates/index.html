{% extends "base.html" %}

{% block title %}Welcome to MedTrack{% endblock %}

{% block auth_content %}
<div class="auth-card fade-in">
    <h2><i class="bi bi-heart-pulse"></i> MedTrack</h2>
    <p class="text-center text-muted">Medical Records Management System</p>
    <hr>
    <div class="d-grid gap-3">
        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </a>
        <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-lg">
            <i class="bi bi-person-plus"></i> Register
        </a>
    </div>
    <hr>
    <p class="text-center text-muted small mt-3">
        <i class="bi bi-shield-check"></i> Secure Medical Records Management
    </p>
</div>
{% endblock %}
