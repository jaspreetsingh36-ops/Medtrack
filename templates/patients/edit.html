{% extends "base.html" %}

{% block title %}Edit Patient - MedTrack{% endblock %}

{% block page_title %}Edit Patient Information{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <h2><i class="bi bi-pencil-square"></i> Edit Patient</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Full Name *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ patient.name }}" required>
        </div>
        
        <div class="mb-3">
            <label for="dob" class="form-label">Date of Birth *</label>
            <input type="date" class="form-control" id="dob" name="dob" value="{{ patient.dob.strftime('%Y-%m-%d') if patient.dob else '' }}" required>
        </div>
        
        <div class="mb-3">
            <label for="contact" class="form-label">Contact Number *</label>
            <input type="tel" class="form-control" id="contact" name="contact" value="{{ patient.contact }}" required>
        </div>
        
        <div class="mb-3">
            <label for="insurance_no" class="form-label">Insurance Number</label>
            <input type="text" class="form-control" id="insurance_no" name="insurance_no" value="{{ patient.insurance_no }}">
        </div>
        
        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" name="address" rows="3">{{ patient.address }}</textarea>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Update Patient
            </button>
            <a href="{{ url_for('list_patients') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
