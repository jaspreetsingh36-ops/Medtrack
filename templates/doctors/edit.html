{% extends "base.html" %}

{% block title %}Edit Doctor - MedTrack{% endblock %}

{% block page_title %}Edit Doctor Information{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <h2><i class="bi bi-pencil-square"></i> Edit Doctor</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Full Name *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ doctor.name }}" required>
        </div>
        
        <div class="mb-3">
            <label for="specialization" class="form-label">Specialization *</label>
            <input type="text" class="form-control" id="specialization" name="specialization" 
                   value="{{ doctor.specialization }}" required>
        </div>
        
        <div class="mb-3">
            <label for="contact" class="form-label">Contact Number *</label>
            <input type="tel" class="form-control" id="contact" name="contact" value="{{ doctor.contact }}" required>
        </div>
        
        <div class="mb-3">
            <label for="email" class="form-label">Email *</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ doctor.email }}" required>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Update Doctor
            </button>
            <a href="{{ url_for('list_doctors') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
