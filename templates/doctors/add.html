{% extends "base.html" %}

{% block title %}Add Doctor - MedTrack{% endblock %}

{% block page_title %}Add New Doctor{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <h2><i class="bi bi-person-plus"></i> Doctor Registration</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Full Name *</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        
        <div class="mb-3">
            <label for="specialization" class="form-label">Specialization *</label>
            <input type="text" class="form-control" id="specialization" name="specialization" 
                   placeholder="e.g., Cardiology, Neurology, Pediatrics" required>
        </div>
        
        <div class="mb-3">
            <label for="contact" class="form-label">Contact Number *</label>
            <input type="tel" class="form-control" id="contact" name="contact" required>
        </div>
        
        <div class="mb-3">
            <label for="email" class="form-label">Email *</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Save Doctor
            </button>
            <a href="{{ url_for('list_doctors') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
