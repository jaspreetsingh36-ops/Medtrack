{% extends "base.html" %}

{% block title %}Edit Appointment - MedTrack{% endblock %}

{% block page_title %}Edit Appointment{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <h2><i class="bi bi-pencil-square"></i> Edit Appointment</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="appointment_date" class="form-label">Appointment Date & Time *</label>
            <input type="datetime-local" class="form-control" id="appointment_date" name="appointment_date" 
                   value="{{ appointment.appointment_date.strftime('%Y-%m-%dT%H:%M') if appointment.appointment_date else '' }}" required>
        </div>
        
        <div class="mb-3">
            <label for="status" class="form-label">Status *</label>
            <select class="form-select" id="status" name="status" required>
                <option value="scheduled" {% if appointment.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
                <option value="completed" {% if appointment.status == 'completed' %}selected{% endif %}>Completed</option>
                <option value="cancelled" {% if appointment.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label for="reason" class="form-label">Reason for Visit</label>
            <textarea class="form-control" id="reason" name="reason" rows="3">{{ appointment.reason }}</textarea>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Update Appointment
            </button>
            <a href="{{ url_for('list_appointments') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
